name: Obsidian Docs Cloud Pipeline

on:
  schedule:
    # Corre cada 48 horas a las 7 AM (España) = 6 AM UTC
    - cron: '0 6 */2 * *'

  push:
    branches:
      - main
    paths:
      - 'config/repos.yml'  # LA CLAVE: Solo se dispara si cambia este archivo

  workflow_dispatch:
    # Permite correrlo a mano con la opción de Dry Run
    inputs:
      dry_run:
        description: 'Dry Run (no pushear a Obsidian)'
        required: true
        type: boolean
        default: false

jobs:
  sync-and-curate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Sync Engine Repo
        uses: actions/checkout@v4
        with:
          path: sync-engine
          token: ${{ secrets.OBSIDIAN_PAT }}

      - name: 📥 Checkout Obsidian Vault (Target)
        uses: actions/checkout@v4
        with:
          repository: XaviCode1000/obsidian-vault
          token: ${{ secrets.OBSIDIAN_PAT }}
          path: obsidian-vault

      - name: 🛠️ Instalar dependencias modernas (yq, fd)
        run: |
          sudo apt-get update
          sudo apt-get install -y fd-find ripgrep
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: 🚀 Ejecutar Motor de Sincronización y Curación
        run: |
          cd sync-engine
          chmod +x scripts/*.sh
          ./scripts/01-clone-repos.sh
          ./scripts/02-curate-docs.sh

      - name: 📦 Empaquetar y Pushear a Obsidian
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd sync-engine
          ./scripts/03-push-to-vault.sh ../obsidian-vault